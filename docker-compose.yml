services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 2s
      timeout: 2s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      HTTP_ADDR: ":4000"
      DATABASE_URL: postgres://taskflow:taskflow@postgres:5432/taskflow?sslmode=disable
      JWT_SECRET: change-me
      ENV: production
      LOG_FORMAT: json
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      RUN_MIGRATIONS: "1"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

